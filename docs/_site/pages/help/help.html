<p>If you encounter problems, we recommend the following strategies:</p>

<ul>

  </li>
  <li>
    <p>If that doesn’t work, <a href="https://github.com/Campbell-Muscle-Lab/MyoProfiler/issues">submit an issue</a>.</p>

  <li>
    <p>If you don’t hear back in 3 days, <a href="mailto:utku.gulbulak@uky.edu">email Utku Gulbulak</a>.</p>

</ul>
